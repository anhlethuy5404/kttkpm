{% extends 'catalog/base.html' %}
{% block title %}Sign In - UniqueShop Premium Store{% endblock %}

{% block content %}
<div class="form-card">
    <h2>Sign In</h2>
    <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" name="username" id="username" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" name="password" id="password" class="form-control" required>
        </div>
        <button type="submit" class="btn-primary" style="width:100%; padding:12px; font-weight:600;">Sign In</button>
    </form>
    <div class="form-help">
        Don&apos;t have an accountVND <a href="{% url 'register' %}">Sign up now</a>
    </div>
</div>
{% endblock %}
