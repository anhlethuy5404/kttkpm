{% extends 'catalog/base.html' %}
{% block title %}Sign Up - UniqueShop Premium Store{% endblock %}

{% block content %}
<div class="form-card">
    <h2>Create Your Account</h2>
    <form method="POST" action="{% url 'register' %}">
        {% csrf_token %}
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" name="username" id="username" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" name="email" id="email" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" name="password" id="password" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="role">Account Type</label>
            <select name="role" id="role" class="form-control">
                <option value="customer" selected>Customer</option>
                <option value="staff">Staff Member</option>
            </select>
        </div>
        <button type="submit" class="btn-primary" style="width:100%; padding:12px; font-weight:600;">Create Account</button>
    </form>
    <div class="form-help">
        Already have an accountVND <a href="{% url 'login' %}">Sign in here</a>
    </div>
</div>
{% endblock %}
